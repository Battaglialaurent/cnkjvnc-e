<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laurent Battaglia</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battaglia">

    <style>
        :root {
            --bg-page: #1a1a1a;
            --card-ratio: 1.6 / 1;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-page);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Conteneur de la carte */
        .card-container {
            width: 90vw;
            max-width: 450px;
            aspect-ratio: var(--card-ratio);
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* État retourné */
        .card.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            background-color: #e2d1b4; /* Couleur de fond des images */
        }

        .back {
            transform: rotateY(180deg);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .hint {
            margin-top: 30px;
            font-size: 0.85rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
        <div class="card">
            <div class="front">
                <img src="1.png" alt="Recto">
            </div>
            <div class="back">
                <img src="Battaglia.png" alt="Verso">
            </div>
        </div>
    </div>

    <div class="hint">Touchez pour retourner</div>

    <script>
        // Enregistrement du Service Worker pour le mode hors-ligne
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW enregistré !'))
                    .catch(err => console.log('Erreur SW:', err));
            });
        }

        // Empêcher le rebond du scroll sur iOS
        document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
