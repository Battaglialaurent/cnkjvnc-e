<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carte Laurent Battaglia</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-color: #e2d1b4; } /* Couleur assortie au fond de tes images */
        
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Conteneur de la carte */
        .card-container {
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1.6 / 1; /* Format carte de visite */
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Classe ajoutée au clic pour tourner */
        .card.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .back {
            transform: rotateY(180deg);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            color: white;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
        <div class="card">
            <div class="front">
                <img src="1.jpg" alt="Recto">
            </div>
            <div class="back">
                <img src="Battaglia.png" alt="Verso">
            </div>
        </div>
    </div>

    <div class="instruction">Appuyez pour retourner la carte</div>

    <script>
        // Enregistrement du Service Worker pour le mode hors-ligne
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
